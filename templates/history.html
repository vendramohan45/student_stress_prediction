<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>History - Student Stress Predictor</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            padding-top: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(34, 49, 63, 0.7);
            padding: 1.5rem;
        }
        h2 {
            margin-bottom: 1.5rem;
        }
        table {
            color: #fff;
        }
        thead th {
            border-bottom: 2px solid #7c3aed;
        }
        tbody tr:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .navbar {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }
        .nav-link, .navbar-brand {
            color: #c5b0ff;
        }
        .nav-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark p-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="/index">Student Stress Predictor</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/index">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard">Overview</a></li>
                <li class="nav-item"><a class="nav-link active" href="/history">History</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin">Admin</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Stress History for {{ user }}</h2>
        <table class="table table-hover table-striped">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Stress Level (%)</th>
                </tr>
            </thead>
            <tbody>
                {% for record in history %}
                <tr>
                    <td>{{ record.date }}</td>
                    <td>{{ record.stress_level }}</td>
                </tr>
                {% endfor %}
                {% if history|length == 0 %}
                <tr><td colspan="2" class="text-center">No history records found.</td></tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
